<html lang="es">
    <head>
    <meta charset="UTF-8">
        <title>Inscripcion a equipo | 8vo ciclo sistemas</title>
    <style>
        *{
            padding=0;
            
        }
        main{
            background: #5FB0C9;
        }
        form{
        display:flex;
        gap:16px;
        flex-direction: column;
        }
    </style>
    </head>
    <body>
    <main id="main" class="formulario inscripcion active">
    <h1>Inscripcion a equipo 02-2026</h1>
        <form autocomplete="off" action="">
            <div>
            <label for="studentID">Carné de Estudiante</label>
            <input type="text" id="studentID" required/>
            </div>

            <div>
            <label for="studentName">Nombre de Estudiante</label>
            <input type="text" id="studentName" required/>
            </div>
                
            <div>
            <label for="studentYear">Año de nacimiento</label>
            <input type="date" id="studentYear" required max="2010-07-23"/>
            </div>
            
            <div>
            <label for="selectedTeamId">Seleccione su equipo</label>
            <select id="selectedTeamId" >
                <option value="1">FC Barcelona</option>
                <option value="2">Real Madrid</option>
            </select>
            </div>

            <input type="submit" value="Enviar">
            

            
        </form>
    </main>
    </body>
</html>
